# API + AI only. MySQL on your host — database `aijobtracker`.
# Copy `.env.example` to `.env` here and set DB_PASSWORD, GROQ_API_KEY, JWT_SECRET.

services:
  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}

  server:
    build: ./server
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "3001"
      NODE_ENV: production
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-aijobtracker}
      DATABASE_URL: ${DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 7d
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      - ai-service
